<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#b70052">
  <title>PUSH Closer Map</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/push-icon.svg">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- LOGIN SCREEN -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-card">
      <div class="login-logo">PUSH</div>
      <p class="login-subtitle">Closer Map — Casablanca</p>
      <div class="login-closers" id="loginClosers">
        <button class="closer-btn" data-id="anes"><span>🔴</span> Anes</button>
        <button class="closer-btn" data-id="zack"><span>🟣</span> Zack</button>
        <button class="closer-btn" data-id="hajj"><span>🟠</span> Hajj</button>
        <button class="closer-btn" data-id="yacine"><span>🟢</span> Yacine</button>
        <button class="closer-btn closer-admin" data-id="sonny">Sonny</button>
      </div>
      <div class="login-form" id="loginForm" style="display:none">
        <p id="loginName" style="font-weight:700;font-size:1.1rem;margin-bottom:12px;"></p>
        <input type="password" id="loginPassword" class="login-input" placeholder="Mot de passe" autocomplete="off">
        <button class="login-submit" id="loginSubmit">Entrer</button>
        <button class="login-back" id="loginBack">← Retour</button>
        <p class="login-error" id="loginError" style="display:none">Mot de passe incorrect</p>
      </div>
    </div>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="push-logo">PUSH</div>
    </div>
    <div class="header-center">
      <div class="search-box" id="searchBox">
        <span class="material-symbols-outlined search-icon">search</span>
        <input type="text" class="search-input" id="searchInput" placeholder="Rechercher un commerce..." autocomplete="off">
        <button class="search-clear" id="searchClear">&times;</button>
      </div>
      <div class="search-results" id="searchResults"></div>
    </div>
    <div class="header-right">
      <span class="lead-count" id="leadCount">247</span>
      <button class="btn-icon" id="btnStats" aria-label="Stats">
        <span class="material-symbols-outlined">bar_chart</span>
      </button>
    </div>
  </header>

  <!-- Filter bar -->
  <div class="filter-bar" id="filterBar">
    <div class="filter-scroll">
      <button class="filter-pill active" data-filter="all">Tous</button>
      <div id="nichePills"></div>
    </div>
    <div class="filter-row" id="filterRow2">
      <select class="filter-select" id="zoneFilter">
        <option value="all">Tous les quartiers</option>
      </select>
      <select class="filter-select" id="statusFilter">
        <option value="all">Tous statuts</option>
        <option value="not_visited">Pas visite</option>
        <option value="contacted">Contacte</option>
        <option value="demo_done">Demo faite</option>
        <option value="rdv_planned">RDV planifie</option>
        <option value="closed">Close</option>
        <option value="not_interested">Pas interesse</option>
      </select>
    </div>
  </div>

  <!-- Map -->
  <div id="map"></div>

  <!-- Bottom sheet overlay -->
  <div class="sheet-overlay" id="sheetOverlay"></div>

  <!-- Bottom sheet -->
  <div class="bottom-sheet" id="bottomSheet">
    <div class="sheet-handle"><div class="handle-bar"></div></div>
    <div class="sheet-content" id="sheetContent"></div>
  </div>

  <!-- Stats modal -->
  <div class="modal-overlay" id="statsOverlay">
    <div class="modal" id="statsModal">
      <div class="modal-header">
        <h2>Stats Terrain</h2>
        <button class="btn-close" id="closeStats">&times;</button>
      </div>
      <div class="modal-body" id="statsBody"></div>
    </div>
  </div>

  <!-- Niche guide modal -->
  <div class="modal-overlay" id="nicheOverlay">
    <div class="modal modal-large" id="nicheModal">
      <div class="modal-header">
        <h2 id="nicheModalTitle">Guide Niche</h2>
        <button class="btn-close" id="closeNiche">&times;</button>
      </div>
      <div class="modal-body" id="nicheBody"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
